<svg viewBox="0 0 260 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .small { font-family: sans-serif; font-size: 10px; fill: #888; }
      .small-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .meta { font-family: sans-serif; font-size: 9px; fill: #888; }
      .meta-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .meta-italic { font-family: sans-serif; font-size: 9px; fill: #aaa; font-style: italic; }
      .roll-name { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #111; }
      .frame-num { font-family: sans-serif; font-size: 9px; font-weight: 500; fill: #111; }
      .frame-num-empty { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .btn-label { font-family: sans-serif; font-size: 10px; font-weight: 500; fill: #111; }
      .btn-label-sm { font-family: sans-serif; font-size: 9px; fill: #888; }
      .btn-label-danger { font-family: sans-serif; font-size: 10px; fill: #c0392b; }
      .card-logged { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .card-unlogged { fill: #f5f5f5; stroke: #ddd; stroke-width: 0.5; stroke-dasharray: 3,2; }
      .circle-filled { fill: #fff; stroke: #888; stroke-width: 1; }
      .circle-empty { fill: none; stroke: #ccc; stroke-width: 0.5; }
      .outer { fill: #f5f5f5; stroke: #bbb; stroke-width: 1; }
      .box { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .btn { fill: #efefef; stroke: #bbb; stroke-width: 0.5; }
      .btn-primary { fill: #fff; stroke: #bbb; stroke-width: 1; }
      .btn-load { fill: #fff; stroke: #888; stroke-width: 1.5; }
      .divider { stroke: #e0e0e0; stroke-width: 0.5; }
      .search { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .current-label { font-family: monospace; font-size: 7px; fill: #aaa; }
      .bottom-bar { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .sheet { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .sheet-title { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #111; }
      .sheet-body { font-family: sans-serif; font-size: 9px; fill: #888; }
      .progress-bar-bg { fill: #efefef; }
      .progress-bar-fill { fill: #888; }
      .annotation { font-family: monospace; font-size: 8px; fill: #bbb; }
      .state-label { font-family: monospace; font-size: 8px; fill: #bbb; }
    </style>
  </defs>

  <rect x="10" y="10" width="240" height="490" rx="16" class="outer"/>

  <rect x="10" y="10" width="240" height="44" rx="16" class="box"/>
  <rect x="10" y="42" width="240" height="12" class="box"/>
  <text x="26" y="26" class="small">←</text>
  <text x="125" y="26" text-anchor="middle" class="roll-name">Double-X — stock</text>
  <text x="240" y="26" text-anchor="end" class="small">⋯</text>
  <text x="125" y="38" text-anchor="middle" class="small-muted">Kodak Double-X  ·  not loaded  ·  ISO 250</text>
  <rect x="60" y="44" width="80" height="4" rx="2" class="progress-bar-bg"/>
  <text x="146" y="50" class="meta-muted">0 / 38 logged</text>

  <line x1="10" y1="54" x2="250" y2="54" class="divider"/>

  <rect x="20" y="60" width="140" height="20" rx="4" class="search"/>
  <text x="90" y="73" text-anchor="middle" class="meta-muted">search frames...</text>
  <rect x="166" y="60" width="64" height="20" rx="4" class="btn"/>
  <text x="198" y="73" text-anchor="middle" class="btn-label-sm">sort: frame ▾</text>

  <line x1="10" y1="86" x2="250" y2="86" class="divider"/>

  <rect x="20" y="92" width="210" height="30" rx="6" class="card-unlogged"/>
  <circle cx="36" cy="107" r="10" class="circle-empty"/>
  <text x="36" y="111" text-anchor="middle" class="frame-num-empty">1</text>
  <text x="52" y="110" class="meta-muted">— unlogged —</text>

  <rect x="20" y="128" width="210" height="30" rx="6" class="card-unlogged"/>
  <circle cx="36" cy="143" r="10" class="circle-empty"/>
  <text x="36" y="147" text-anchor="middle" class="frame-num-empty">2</text>
  <text x="52" y="146" class="meta-muted">— unlogged —</text>

  <text x="125" y="174" text-anchor="middle" class="meta-muted">· · · frames 3–38 all unlogged · · ·</text>

  <line x1="10" y1="184" x2="250" y2="184" class="divider"/>

  <text x="20" y="196" class="state-label">bottom bar — unloaded roll state</text>
  <rect x="10" y="200" width="240" height="44" class="bottom-bar"/>
  <rect x="10" y="222" width="240" height="22" class="bottom-bar"/>
  <rect x="20" y="206" width="148" height="28" rx="4" class="btn-load"/>
  <text x="94" y="225" text-anchor="middle" class="btn-label">load roll</text>
  <rect x="174" y="206" width="66" height="28" rx="4" class="btn"/>
  <text x="207" y="225" text-anchor="middle" class="btn-label-sm">export ▾</text>

  <line x1="10" y1="244" x2="250" y2="244" class="divider"/>

  <text x="20" y="256" class="state-label">bottom bar — loaded roll state</text>
  <rect x="10" y="260" width="240" height="44" class="bottom-bar"/>
  <rect x="10" y="282" width="240" height="22" class="bottom-bar"/>
  <rect x="20" y="266" width="148" height="28" rx="4" class="btn-primary"/>
  <text x="94" y="285" text-anchor="middle" class="btn-label">finish roll</text>
  <rect x="174" y="266" width="66" height="28" rx="4" class="btn"/>
  <text x="207" y="285" text-anchor="middle" class="btn-label-sm">export ▾</text>

  <line x1="10" y1="304" x2="250" y2="304" class="divider"/>

  <text x="20" y="316" class="annotation">load roll confirmation sheet</text>
  <rect x="10" y="322" width="240" height="100" rx="12" class="sheet"/>
  <text x="125" y="342" text-anchor="middle" class="sheet-title">load this roll?</text>
  <text x="125" y="356" text-anchor="middle" class="sheet-body">Double-X will become your active roll.</text>
  <text x="125" y="368" text-anchor="middle" class="sheet-body">The widget and quick screen will</text>
  <text x="125" y="380" text-anchor="middle" class="sheet-body">update to reflect this roll.</text>
  <rect x="20" y="390" width="100" height="24" rx="4" class="btn-load"/>
  <text x="70" y="406" text-anchor="middle" class="btn-label">load roll</text>
  <rect x="130" y="390" width="100" height="24" rx="4" class="btn"/>
  <text x="180" y="406" text-anchor="middle" class="btn-label-sm">cancel</text>

  <line x1="10" y1="432" x2="250" y2="432" class="divider"/>

  <text x="20" y="444" class="annotation">delete confirmation — overflow menu only</text>
  <rect x="10" y="450" width="240" height="90" rx="12" class="sheet"/>
  <text x="125" y="470" text-anchor="middle" class="sheet-title">delete this roll?</text>
  <text x="125" y="484" text-anchor="middle" class="sheet-body">All 38 frame slots and logged data</text>
  <text x="125" y="496" text-anchor="middle" class="sheet-body">will be permanently deleted.</text>
  <text x="125" y="508" text-anchor="middle" class="sheet-body">This cannot be undone.</text>
  <rect x="20" y="518" width="100" height="24" rx="4" class="btn-primary"/>
  <text x="70" y="534" text-anchor="middle" class="btn-label-danger">delete</text>
  <rect x="130" y="518" width="100" height="24" rx="4" class="btn"/>
  <text x="180" y="534" text-anchor="middle" class="btn-label-sm">cancel</text>

  <text x="258" y="140" class="annotation">scroll</text>
  <line x1="254" y1="86" x2="254" y2="184" style="stroke:#ddd;stroke-width:0.5;stroke-dasharray:2,2;"/>
</svg>
