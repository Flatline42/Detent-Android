<svg viewBox="0 0 260 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .small { font-family: sans-serif; font-size: 10px; fill: #888; }
      .small-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .meta { font-family: sans-serif; font-size: 9px; fill: #888; }
      .meta-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .meta-italic { font-family: sans-serif; font-size: 9px; fill: #aaa; font-style: italic; }
      .roll-name { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #111; }
      .roll-name-muted { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #888; }
      .tab-active { font-family: sans-serif; font-size: 10px; font-weight: 500; fill: #111; }
      .tab-inactive { font-family: sans-serif; font-size: 10px; fill: #aaa; }
      .btn-label { font-family: sans-serif; font-size: 10px; font-weight: 500; fill: #111; }
      .btn-label-sm { font-family: sans-serif; font-size: 9px; fill: #888; }
      .btn-label-danger { font-family: sans-serif; font-size: 9px; fill: #c0392b; }
      .swipe-hint { font-family: sans-serif; font-size: 8px; fill: #aaa; font-style: italic; }
      .card { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .card-unloaded { fill: #f5f5f5; stroke: #ddd; stroke-width: 0.5; stroke-dasharray: 3,2; }
      .outer { fill: #f5f5f5; stroke: #bbb; stroke-width: 1; }
      .btn { fill: #efefef; stroke: #bbb; stroke-width: 0.5; }
      .btn-primary { fill: #fff; stroke: #bbb; stroke-width: 1; }
      .search { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .icon-box { fill: #efefef; stroke: #ddd; stroke-width: 0.5; }
      .icon-box-muted { fill: #efefef; stroke: #ddd; stroke-width: 0.5; opacity: 0.5; }
      .progress-bar-bg { fill: #efefef; }
      .progress-bar-fill { fill: #888; }
      .divider { stroke: #e0e0e0; stroke-width: 0.5; }
      .tab-underline { stroke: #555; stroke-width: 2; }
      .annotation { font-family: monospace; font-size: 8px; fill: #bbb; }
      .fab { fill: #fff; stroke: #bbb; stroke-width: 1.5; }
      .fab-label { font-family: sans-serif; font-size: 16px; font-weight: 500; fill: #111; }
      .sheet { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .menu-item { fill: #fff; stroke: #e0e0e0; stroke-width: 0.5; }
      .menu-label { font-family: sans-serif; font-size: 10px; fill: #111; }
      .swipe-bg { fill: #efefef; stroke: #ddd; stroke-width: 0.5; }
      .swipe-label { font-family: sans-serif; font-size: 9px; font-weight: 500; fill: #888; }
    </style>
  </defs>

  <rect x="10" y="10" width="240" height="480" rx="16" class="outer"/>
  <rect x="10" y="10" width="240" height="34" rx="16" class="outer"/>
  <rect x="10" y="32" width="240" height="12" class="outer"/>
  <text x="125" y="30" text-anchor="middle" class="small">Rolls</text>

  <line x1="10" y1="44" x2="250" y2="44" class="divider"/>

  <rect x="10" y="44" width="80" height="26" class="outer"/>
  <rect x="90" y="44" width="80" height="26" class="outer"/>
  <rect x="170" y="44" width="80" height="26" class="outer"/>
  <text x="50" y="61" text-anchor="middle" class="tab-active">Active (3)</text>
  <line x1="18" y1="70" x2="82" y2="70" class="tab-underline"/>
  <text x="130" y="61" text-anchor="middle" class="tab-inactive">Finished</text>
  <text x="210" y="61" text-anchor="middle" class="tab-inactive">Archived</text>

  <line x1="10" y1="70" x2="250" y2="70" class="divider"/>

  <rect x="20" y="76" width="152" height="20" rx="4" class="search"/>
  <text x="96" y="89" text-anchor="middle" class="meta-muted">search rolls...</text>
  <rect x="178" y="76" width="62" height="20" rx="4" class="btn"/>
  <text x="209" y="89" text-anchor="middle" class="btn-label-sm">filter ▾</text>

  <line x1="10" y1="102" x2="250" y2="102" class="divider"/>

  <text x="20" y="114" class="annotation">loaded rolls</text>
  <rect x="20" y="118" width="210" height="66" rx="6" class="card"/>
  <rect x="28" y="128" width="24" height="24" rx="4" class="icon-box"/>
  <text x="40" y="144" text-anchor="middle" class="meta">[cam]</text>
  <text x="60" y="132" class="roll-name">HP5 Plus — AE-1</text>
  <text x="60" y="143" class="meta">Ilford HP5 Plus 400  ·  Canon AE-1</text>
  <text x="60" y="154" class="meta">Loaded 2026-03-06  ·  ISO 400</text>
  <rect x="60" y="159" width="80" height="4" rx="2" class="progress-bar-bg"/>
  <rect x="60" y="159" width="30" height="4" rx="2" class="progress-bar-fill"/>
  <text x="146" y="164" class="meta-muted">14 / 38</text>
  <text x="60" y="178" class="meta-italic">"good light at the valley..."</text>

  <text x="20" y="196" class="annotation">unloaded rolls — dashed border, muted icon</text>
  <rect x="20" y="200" width="210" height="60" rx="6" class="card-unloaded"/>
  <rect x="28" y="210" width="24" height="24" rx="4" class="icon-box-muted"/>
  <text x="40" y="226" text-anchor="middle" class="meta-muted">[roll]</text>
  <text x="60" y="214" class="roll-name-muted">Double-X — stock</text>
  <text x="60" y="225" class="meta-muted">Kodak Double-X  ·  not loaded</text>
  <text x="60" y="236" class="meta-muted">Added 2026-03-15  ·  0 / 38</text>
  <text x="224" y="254" text-anchor="end" class="swipe-hint">← swipe to load →</text>

  <line x1="10" y1="270" x2="250" y2="270" class="divider"/>

  <text x="20" y="284" class="annotation">swipe reveal</text>
  <rect x="20" y="290" width="210" height="46" rx="6" class="swipe-bg"/>
  <text x="125" y="317" text-anchor="middle" class="swipe-label">⟵  load roll  ⟶</text>

  <line x1="10" y1="346" x2="250" y2="346" class="divider"/>

  <text x="20" y="360" class="annotation">long press menu — context aware (unloaded roll)</text>
  <rect x="60" y="368" width="150" height="110" rx="8" class="sheet"/>
  <rect x="60" y="368" width="150" height="26" rx="8" class="menu-item"/>
  <rect x="60" y="382" width="150" height="12" class="menu-item"/>
  <text x="135" y="384" text-anchor="middle" class="menu-label">load roll</text>
  <line x1="68" y1="394" x2="202" y2="394" class="divider"/>
  <rect x="60" y="394" width="150" height="26" class="menu-item"/>
  <text x="135" y="411" text-anchor="middle" class="menu-label">open journal</text>
  <line x1="68" y1="420" x2="202" y2="420" class="divider"/>
  <rect x="60" y="420" width="150" height="26" rx="8" class="menu-item"/>
  <rect x="60" y="420" width="150" height="14" class="menu-item"/>
  <text x="135" y="437" text-anchor="middle" class="btn-label-danger">delete roll</text>

  <circle cx="218" cy="452" r="18" class="fab"/>
  <text x="218" y="459" text-anchor="middle" class="fab-label">+</text>

  <text x="258" y="180" class="annotation">scroll</text>
  <line x1="254" y1="102" x2="254" y2="265" style="stroke:#ddd;stroke-width:0.5;stroke-dasharray:2,2;"/>
</svg>
