<svg viewBox="0 0 260 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .small { font-family: sans-serif; font-size: 10px; fill: #888; }
      .small-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .meta { font-family: sans-serif; font-size: 9px; fill: #888; }
      .meta-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .gear-name { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #111; }
      .tab-active { font-family: sans-serif; font-size: 9px; font-weight: 500; fill: #111; }
      .tab-inactive { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .btn-label-sm { font-family: sans-serif; font-size: 9px; fill: #888; }
      .box { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .outer { fill: #f5f5f5; stroke: #bbb; stroke-width: 1; }
      .btn { fill: #efefef; stroke: #bbb; stroke-width: 0.5; }
      .card { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .divider { stroke: #e0e0e0; stroke-width: 0.5; }
      .tab-underline { stroke: #555; stroke-width: 2; }
      .search { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .annotation { font-family: monospace; font-size: 8px; fill: #bbb; }
      .fab { fill: #fff; stroke: #bbb; stroke-width: 1.5; }
      .fab-label { font-family: sans-serif; font-size: 16px; font-weight: 500; fill: #111; }
    </style>
  </defs>

  <rect x="10" y="10" width="240" height="560" rx="16" class="outer"/>

  <rect x="10" y="10" width="240" height="34" rx="16" class="box"/>
  <rect x="10" y="32" width="240" height="12" class="box"/>
  <text x="125" y="28" text-anchor="middle" class="small">Gear Library</text>

  <line x1="10" y1="44" x2="250" y2="44" class="divider"/>

  <rect x="10" y="44" width="48" height="24" class="outer"/>
  <rect x="58" y="44" width="48" height="24" class="outer"/>
  <rect x="106" y="44" width="48" height="24" class="outer"/>
  <rect x="154" y="44" width="48" height="24" class="outer"/>
  <rect x="202" y="44" width="48" height="24" class="outer"/>
  <text x="34" y="60" text-anchor="middle" class="tab-active">Lenses</text>
  <line x1="14" y1="68" x2="54" y2="68" class="tab-underline"/>
  <text x="82" y="60" text-anchor="middle" class="tab-inactive">Bodies</text>
  <text x="130" y="60" text-anchor="middle" class="tab-inactive">Filters</text>
  <text x="178" y="60" text-anchor="middle" class="tab-inactive">Stocks</text>
  <text x="226" y="60" text-anchor="middle" class="tab-inactive">Kits</text>

  <line x1="10" y1="68" x2="250" y2="68" class="divider"/>

  <rect x="20" y="74" width="128" height="20" rx="4" class="search"/>
  <text x="84" y="87" text-anchor="middle" class="meta-muted">search lenses...</text>
  <rect x="154" y="74" width="76" height="20" rx="4" class="btn"/>
  <text x="192" y="87" text-anchor="middle" class="btn-label-sm">A–Z  ▾</text>

  <line x1="10" y1="100" x2="250" y2="100" class="divider"/>

  <rect x="20" y="108" width="210" height="66" rx="6" class="card"/>
  <text x="30" y="122" class="gear-name">FD 50mm f/1.4</text>
  <text x="230" y="122" text-anchor="end" class="meta-muted">Canon FD</text>
  <text x="30" y="134" class="meta">Canon  ·  50mm  ·  f/1.4 – f/16</text>
  <text x="30" y="145" class="meta">half stop  ·  52mm filter</text>
  <text x="30" y="156" class="meta-muted">soft at f/1.4, vignettes wide open</text>
  <text x="230" y="166" text-anchor="end" class="meta-muted">8 rolls</text>

  <rect x="20" y="180" width="210" height="56" rx="6" class="card"/>
  <text x="30" y="194" class="gear-name">FD 28mm f/2.8</text>
  <text x="230" y="194" text-anchor="end" class="meta-muted">Canon FD</text>
  <text x="30" y="206" class="meta">Canon  ·  28mm  ·  f/2.8 – f/22</text>
  <text x="30" y="217" class="meta">full stop  ·  55mm filter</text>
  <text x="230" y="228" text-anchor="end" class="meta-muted">3 rolls</text>

  <rect x="20" y="242" width="210" height="46" rx="6" class="card"/>
  <text x="30" y="256" class="gear-name">FD 135mm f/3.5</text>
  <text x="230" y="256" text-anchor="end" class="meta-muted">Canon FD</text>
  <text x="30" y="268" class="meta">Canon  ·  135mm  ·  f/3.5 – f/22</text>
  <text x="30" y="279" class="meta">full stop  ·  55mm filter</text>

  <line x1="10" y1="298" x2="250" y2="298" class="divider"/>

  <text x="20" y="310" class="annotation">filter tab example</text>

  <rect x="20" y="316" width="210" height="56" rx="6" class="card"/>
  <text x="30" y="330" class="gear-name">Hoya HMC Yellow K2</text>
  <text x="230" y="330" text-anchor="end" class="meta-muted">52mm</text>
  <text x="30" y="342" class="meta">Hoya  ·  color  ·  -1.0 EV</text>
  <text x="30" y="354" class="meta-muted">used in 6 rolls</text>

  <rect x="20" y="378" width="210" height="46" rx="6" class="card"/>
  <text x="30" y="392" class="gear-name">Cokin ND8</text>
  <text x="230" y="392" text-anchor="end" class="meta-muted">slot</text>
  <text x="30" y="404" class="meta">Cokin  ·  ND  ·  -3.0 EV</text>
  <text x="30" y="416" class="meta-muted">P series slot filter</text>

  <line x1="10" y1="432" x2="250" y2="432" class="divider"/>

  <text x="20" y="444" class="annotation">kit tab example</text>

  <rect x="20" y="450" width="210" height="46" rx="6" class="card"/>
  <text x="30" y="464" class="gear-name">Street Kit</text>
  <text x="230" y="464" text-anchor="end" class="small">⋯</text>
  <text x="30" y="476" class="meta">Canon AE-1  ·  FD 50mm (primary)</text>
  <text x="30" y="487" class="meta-muted">YK2  UV  ·  last used 2026-03-06</text>

  <circle cx="218" cy="532" r="18" class="fab"/>
  <text x="218" y="539" text-anchor="middle" class="fab-label">+</text>

  <text x="258" y="200" class="annotation">scroll</text>
  <line x1="254" y1="100" x2="254" y2="430" style="stroke:#ddd;stroke-width:0.5;stroke-dasharray:2,2;"/>
</svg>
