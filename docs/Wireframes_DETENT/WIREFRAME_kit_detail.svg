<svg viewBox="0 0 260 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .small { font-family: sans-serif; font-size: 10px; fill: #888; }
      .small-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .meta { font-family: sans-serif; font-size: 9px; fill: #888; }
      .meta-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .screen-title { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #111; }
      .section-head { font-family: sans-serif; font-size: 9px; font-weight: 500; fill: #111; }
      .label { font-family: sans-serif; font-size: 9px; fill: #888; }
      .btn-label { font-family: sans-serif; font-size: 10px; font-weight: 500; fill: #111; }
      .btn-label-sm { font-family: sans-serif; font-size: 9px; fill: #888; }
      .input-value { font-family: sans-serif; font-size: 10px; fill: #111; }
      .radio-label { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .radio-label-active { font-family: sans-serif; font-size: 9px; font-weight: 500; fill: #111; }
      .chip-on { fill: #fff; stroke: #bbb; stroke-width: 1; }
      .chip-off { fill: #efefef; stroke: #ddd; stroke-width: 0.5; }
      .chip-text-on { font-family: sans-serif; font-size: 9px; font-weight: 500; fill: #111; }
      .chip-text-off { font-family: sans-serif; font-size: 9px; fill: #888; }
      .box { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .outer { fill: #f5f5f5; stroke: #bbb; stroke-width: 1; }
      .btn { fill: #efefef; stroke: #bbb; stroke-width: 0.5; }
      .btn-primary { fill: #fff; stroke: #bbb; stroke-width: 1; }
      .input { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .lens-row { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .lens-row-primary { fill: #fff; stroke: #888; stroke-width: 1; }
      .radio-outer { fill: none; stroke: #888; stroke-width: 1; }
      .radio-inner { fill: #888; }
      .radio-empty { fill: none; stroke: #ccc; stroke-width: 1; }
      .divider { stroke: #e0e0e0; stroke-width: 0.5; }
      .divider-section { stroke: #ccc; stroke-width: 0.5; }
      .annotation { font-family: monospace; font-size: 8px; fill: #bbb; }
      .remove { font-family: sans-serif; font-size: 10px; fill: #aaa; }
    </style>
  </defs>

  <rect x="10" y="10" width="240" height="660" rx="16" class="outer"/>

  <rect x="10" y="10" width="240" height="34" rx="16" class="box"/>
  <rect x="10" y="32" width="240" height="12" class="box"/>
  <text x="22" y="28" class="small">←</text>
  <text x="125" y="28" text-anchor="middle" class="screen-title">Street Kit</text>
  <text x="238" y="28" text-anchor="end" class="small">⋯</text>
  <text x="125" y="40" text-anchor="middle" class="small-muted">kit detail — editing</text>

  <line x1="10" y1="44" x2="250" y2="44" class="divider"/>

  <text x="20" y="58" class="label">kit name</text>
  <rect x="20" y="62" width="210" height="22" rx="4" class="input"/>
  <text x="30" y="77" class="input-value">Street Kit</text>

  <line x1="10" y1="92" x2="250" y2="92" class="divider-section"/>

  <text x="20" y="106" class="section-head">camera body</text>
  <rect x="20" y="110" width="210" height="26" rx="4" class="box"/>
  <text x="125" y="127" text-anchor="middle" class="meta">Canon AE-1  ›</text>
  <text x="230" y="106" text-anchor="end" class="meta-muted">Canon FD</text>

  <line x1="10" y1="146" x2="250" y2="146" class="divider-section"/>

  <text x="20" y="160" class="section-head">lenses</text>
  <text x="230" y="160" text-anchor="end" class="meta-muted">Canon FD only</text>

  <rect x="20" y="166" width="210" height="32" rx="4" class="lens-row-primary"/>
  <circle cx="34" cy="182" r="7" class="radio-outer"/>
  <circle cx="34" cy="182" r="4" class="radio-inner"/>
  <text x="46" y="179" class="input-value">FD 50mm f/1.4</text>
  <text x="46" y="191" class="radio-label-active">primary</text>
  <text x="224" y="184" text-anchor="end" class="remove">×</text>

  <rect x="20" y="202" width="210" height="32" rx="4" class="lens-row"/>
  <circle cx="34" cy="218" r="7" class="radio-empty"/>
  <text x="46" y="215" class="input-value">FD 28mm f/2.8</text>
  <text x="46" y="227" class="radio-label">tap to set primary</text>
  <text x="224" y="220" text-anchor="end" class="remove">×</text>

  <rect x="20" y="238" width="210" height="22" rx="4" class="btn"/>
  <text x="125" y="253" text-anchor="middle" class="btn-label-sm">+ add lens</text>

  <line x1="10" y1="270" x2="250" y2="270" class="divider-section"/>

  <text x="20" y="284" class="section-head">filters</text>

  <rect x="20" y="290" width="36" height="18" rx="9" class="chip-on"/>
  <text x="38" y="303" text-anchor="middle" class="chip-text-on">YK2</text>
  <rect x="60" y="290" width="28" height="18" rx="9" class="chip-on"/>
  <text x="74" y="303" text-anchor="middle" class="chip-text-on">UV</text>
  <rect x="92" y="290" width="34" height="18" rx="9" class="chip-off"/>
  <text x="109" y="303" text-anchor="middle" class="chip-text-off">ND8</text>
  <rect x="130" y="290" width="18" height="18" rx="9" class="btn"/>
  <text x="139" y="303" text-anchor="middle" class="chip-text-on">+</text>
  <text x="230" y="303" text-anchor="end" class="meta-muted">2 active</text>

  <line x1="10" y1="320" x2="250" y2="320" class="divider-section"/>

  <text x="20" y="334" class="label">notes</text>
  <rect x="20" y="338" width="210" height="36" rx="4" class="input"/>
  <text x="30" y="356" class="small-muted">optional...</text>

  <line x1="10" y1="384" x2="250" y2="384" class="divider"/>

  <rect x="20" y="392" width="210" height="34" rx="6" class="btn-primary"/>
  <text x="125" y="414" text-anchor="middle" class="btn-label">save kit</text>

  <line x1="10" y1="436" x2="250" y2="436" class="divider"/>

  <text x="20" y="450" class="annotation">body change warning sheet</text>

  <rect x="20" y="456" width="210" height="96" rx="8" class="box"/>
  <text x="125" y="474" text-anchor="middle" class="section-head">change camera body?</text>
  <text x="125" y="488" text-anchor="middle" class="meta-muted">Switching will remove incompatible</text>
  <text x="125" y="500" text-anchor="middle" class="meta-muted">lenses. Review your filter selection</text>
  <text x="125" y="512" text-anchor="middle" class="meta-muted">afterward.</text>
  <rect x="30" y="518" width="88" height="26" rx="4" class="btn-primary"/>
  <text x="74" y="535" text-anchor="middle" class="btn-label-sm">change body</text>
  <rect x="126" y="518" width="94" height="26" rx="4" class="btn"/>
  <text x="173" y="535" text-anchor="middle" class="btn-label-sm">cancel</text>

  <text x="258" y="280" class="annotation">scroll</text>
  <line x1="254" y1="44" x2="254" y2="384" style="stroke:#ddd;stroke-width:0.5;stroke-dasharray:2,2;"/>
</svg>

