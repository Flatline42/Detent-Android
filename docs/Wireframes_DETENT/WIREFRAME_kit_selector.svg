<svg viewBox="0 0 260 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .small { font-family: sans-serif; font-size: 10px; fill: #888; }
      .small-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .meta { font-family: sans-serif; font-size: 9px; fill: #888; }
      .meta-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .kit-name { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #111; }
      .btn-label { font-family: sans-serif; font-size: 10px; font-weight: 500; fill: #111; }
      .btn-label-sm { font-family: sans-serif; font-size: 9px; fill: #888; }
      .box { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .outer { fill: #f5f5f5; stroke: #bbb; stroke-width: 1; }
      .btn { fill: #efefef; stroke: #bbb; stroke-width: 0.5; }
      .card { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .icon-box { fill: #efefef; stroke: #ddd; stroke-width: 0.5; }
      .divider { stroke: #e0e0e0; stroke-width: 0.5; }
      .search { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .annotation { font-family: monospace; font-size: 8px; fill: #bbb; }
      .fab { fill: #fff; stroke: #bbb; stroke-width: 1.5; }
      .fab-label { font-family: sans-serif; font-size: 16px; font-weight: 500; fill: #111; }
    </style>
  </defs>

  <rect x="10" y="10" width="240" height="420" rx="16" class="outer"/>

  <rect x="10" y="10" width="240" height="34" rx="16" class="box"/>
  <rect x="10" y="32" width="240" height="12" class="box"/>
  <text x="22" y="28" class="small">←</text>
  <text x="125" y="28" text-anchor="middle" class="kit-name">Select Kit</text>
  <text x="125" y="40" text-anchor="middle" class="small-muted">tap a kit to pre-fill roll setup</text>

  <line x1="10" y1="44" x2="250" y2="44" class="divider"/>

  <rect x="20" y="52" width="210" height="20" rx="4" class="search"/>
  <text x="125" y="65" text-anchor="middle" class="meta-muted">search kits...</text>

  <line x1="10" y1="78" x2="250" y2="78" class="divider"/>

  <rect x="20" y="86" width="210" height="70" rx="6" class="card"/>
  <rect x="28" y="96" width="24" height="24" rx="4" class="icon-box"/>
  <text x="40" y="112" text-anchor="middle" class="meta">[cam]</text>
  <text x="60" y="100" class="kit-name">Street Kit</text>
  <text x="60" y="111" class="meta">Canon AE-1</text>
  <text x="60" y="122" class="meta">FD 50mm f/1.4  (primary)</text>
  <text x="60" y="133" class="meta">FD 28mm f/2.8</text>
  <text x="60" y="144" class="meta-muted">YK2  UV  ·  2 filters</text>

  <rect x="20" y="162" width="210" height="60" rx="6" class="card"/>
  <rect x="28" y="172" width="24" height="24" rx="4" class="icon-box"/>
  <text x="40" y="188" text-anchor="middle" class="meta">[cam]</text>
  <text x="60" y="176" class="kit-name">Landscape Kit</text>
  <text x="60" y="187" class="meta">Canon AE-1</text>
  <text x="60" y="198" class="meta">FD 28mm f/2.8  (primary)</text>
  <text x="60" y="209" class="meta-muted">YK2  UV  ND8  ·  3 filters</text>

  <rect x="20" y="228" width="210" height="50" rx="6" class="card"/>
  <rect x="28" y="238" width="24" height="24" rx="4" class="icon-box"/>
  <text x="40" y="254" text-anchor="middle" class="meta">[cam]</text>
  <text x="60" y="242" class="kit-name">Minimal Kit</text>
  <text x="60" y="253" class="meta">Canon AE-1</text>
  <text x="60" y="264" class="meta">FD 50mm f/1.4  (primary)</text>
  <text x="60" y="275" class="meta-muted">no filters</text>

  <text x="125" y="298" text-anchor="middle" class="meta-muted">· · · more kits · · ·</text>

  <line x1="10" y1="308" x2="250" y2="308" class="divider"/>

  <text x="20" y="322" class="annotation">no kit selected — proceed without</text>
  <rect x="20" y="326" width="210" height="28" rx="4" class="btn"/>
  <text x="125" y="344" text-anchor="middle" class="btn-label-sm">skip — fill gear manually</text>

  <circle cx="218" cy="392" r="18" class="fab"/>
  <text x="218" y="399" text-anchor="middle" class="fab-label">+</text>
  <text x="218" y="415" text-anchor="middle" class="annotation">new kit</text>

  <text x="258" y="200" class="annotation">scroll</text>
  <line x1="254" y1="78" x2="254" y2="308" style="stroke:#ddd;stroke-width:0.5;stroke-dasharray:2,2;"/>
</svg>

