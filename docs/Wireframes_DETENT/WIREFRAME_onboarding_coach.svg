<svg viewBox="0 0 260 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .small { font-family: sans-serif; font-size: 10px; fill: #888; }
      .small-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .meta-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .screen-title { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #111; }
      .tab-active { font-family: sans-serif; font-size: 9px; font-weight: 500; fill: #111; }
      .tab-inactive { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .btn-label-sm { font-family: sans-serif; font-size: 9px; fill: #888; }
      .coach-title { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #ffffff; }
      .coach-body { font-family: sans-serif; font-size: 9px; fill: #dddddd; }
      .coach-step { font-family: sans-serif; font-size: 8px; fill: #aaaaaa; }
      .box { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .outer { fill: #f5f5f5; stroke: #bbb; stroke-width: 1; }
      .btn { fill: #efefef; stroke: #bbb; stroke-width: 0.5; }
      .search { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .divider { stroke: #e0e0e0; stroke-width: 0.5; }
      .tab-underline { stroke: #555; stroke-width: 2; }
      .overlay { fill: #111111; opacity: 0.82; }
      .cutout-ring { fill: none; stroke: #ffffff; stroke-width: 2; opacity: 0.9; }
      .coach-card { fill: #222222; stroke: #444444; stroke-width: 0.5; }
      .coach-btn { fill: #ffffff; stroke: none; }
      .coach-btn-label { font-family: sans-serif; font-size: 9px; font-weight: 500; fill: #111111; }
      .coach-skip { font-family: sans-serif; font-size: 9px; fill: #888888; }
      .fab-highlight { fill: #fff; stroke: #ffffff; stroke-width: 2; }
      .fab-label { font-family: sans-serif; font-size: 16px; font-weight: 500; fill: #111; }
      .annotation { font-family: monospace; font-size: 8px; fill: #bbb; }
      .arrow-coach { font-family: sans-serif; font-size: 20px; fill: #ffffff; }
    </style>
  </defs>

  <rect x="10" y="10" width="240" height="500" rx="16" class="outer"/>

  <rect x="10" y="10" width="240" height="34" rx="16" class="box"/>
  <rect x="10" y="32" width="240" height="12" class="box"/>
  <text x="125" y="28" text-anchor="middle" class="screen-title">Gear Library</text>

  <line x1="10" y1="44" x2="250" y2="44" class="divider"/>

  <rect x="10" y="44" width="48" height="24" class="outer"/>
  <rect x="58" y="44" width="48" height="24" class="outer"/>
  <rect x="106" y="44" width="48" height="24" class="outer"/>
  <rect x="154" y="44" width="48" height="24" class="outer"/>
  <rect x="202" y="44" width="48" height="24" class="outer"/>
  <text x="34" y="60" text-anchor="middle" class="tab-active">Lenses</text>
  <line x1="14" y1="68" x2="54" y2="68" class="tab-underline"/>
  <text x="82" y="60" text-anchor="middle" class="tab-inactive">Bodies</text>
  <text x="130" y="60" text-anchor="middle" class="tab-inactive">Filters</text>
  <text x="178" y="60" text-anchor="middle" class="tab-inactive">Stocks</text>
  <text x="226" y="60" text-anchor="middle" class="tab-inactive">Kits</text>

  <line x1="10" y1="68" x2="250" y2="68" class="divider"/>

  <rect x="20" y="74" width="128" height="20" rx="4" class="search"/>
  <text x="84" y="87" text-anchor="middle" class="meta-muted">search lenses...</text>
  <rect x="154" y="74" width="76" height="20" rx="4" class="btn"/>
  <text x="192" y="87" text-anchor="middle" class="btn-label-sm">A–Z  ▾</text>

  <line x1="10" y1="100" x2="250" y2="100" class="divider"/>

  <text x="125" y="130" text-anchor="middle" class="meta-muted">no lenses yet</text>
  <text x="125" y="144" text-anchor="middle" class="meta-muted">tap + to add your first lens</text>

  <rect x="10" y="44" width="240" height="466" rx="16" class="overlay"/>

  <circle cx="218" cy="472" r="26" class="cutout-ring"/>
  <circle cx="218" cy="472" r="22" class="fab-highlight"/>
  <text x="218" y="479" text-anchor="middle" class="fab-label">+</text>

  <rect x="30" y="300" width="200" height="130" rx="10" class="coach-card"/>

  <text x="125" y="270" text-anchor="middle" class="arrow-coach">↓</text>

  <text x="44" y="322" class="coach-step">step 1 of 5</text>
  <text x="230" y="322" text-anchor="end" class="coach-skip">skip tour</text>

  <text x="44" y="340" class="coach-title">Add your first lens</text>
  <text x="44" y="354" class="coach-body">Lenses are the foundation of your</text>
  <text x="44" y="366" class="coach-body">gear library. Tap the + button to</text>
  <text x="44" y="378" class="coach-body">add your first one.</text>

  <rect x="150" y="390" width="68" height="26" rx="6" class="coach-btn"/>
  <text x="184" y="407" text-anchor="middle" class="coach-btn-label">got it  ›</text>

  <text x="258" y="240" class="annotation">overlay</text>
  <text x="258" y="250" class="annotation">coach</text>
  <text x="258" y="260" class="annotation">mark</text>
</svg>

