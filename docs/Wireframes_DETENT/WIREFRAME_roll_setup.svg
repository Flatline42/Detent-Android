<svg viewBox="0 0 260 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .small { font-family: sans-serif; font-size: 10px; fill: #888; }
      .small-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .meta { font-family: sans-serif; font-size: 9px; fill: #888; }
      .meta-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .roll-name { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #111; }
      .value-sm { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #111; }
      .btn-label { font-family: sans-serif; font-size: 10px; font-weight: 500; fill: #111; }
      .btn-label-secondary { font-family: sans-serif; font-size: 10px; fill: #888; }
      .label { font-family: sans-serif; font-size: 9px; fill: #888; }
      .section-head { font-family: sans-serif; font-size: 9px; font-weight: 500; fill: #111; }
      .arrow { font-family: sans-serif; font-size: 14px; fill: #888; }
      .box { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .outer { fill: #f5f5f5; stroke: #bbb; stroke-width: 1; }
      .btn { fill: #efefef; stroke: #bbb; stroke-width: 0.5; }
      .btn-kit { fill: #fff; stroke: #bbb; stroke-width: 1; }
      .btn-primary { fill: #fff; stroke: #bbb; stroke-width: 1; }
      .toggle-off { fill: #efefef; stroke: #ddd; stroke-width: 0.5; }
      .chip-on { fill: #fff; stroke: #bbb; stroke-width: 1; }
      .chip-off { fill: #efefef; stroke: #ddd; stroke-width: 0.5; }
      .chip-text-on { font-family: sans-serif; font-size: 9px; font-weight: 500; fill: #111; }
      .chip-text-off { font-family: sans-serif; font-size: 9px; fill: #888; }
      .divider { stroke: #e0e0e0; stroke-width: 0.5; }
      .divider-section { stroke: #ccc; stroke-width: 0.5; }
      .annotation { font-family: monospace; font-size: 8px; fill: #bbb; }
      .input { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .custom { font-family: sans-serif; font-size: 8px; fill: #aaa; text-decoration: underline; }
      .iso-label { font-family: sans-serif; font-size: 9px; fill: #aaa; }
    </style>
  </defs>

  <rect x="10" y="10" width="240" height="800" rx="16" class="outer"/>

  <rect x="10" y="10" width="240" height="34" rx="16" class="box"/>
  <rect x="10" y="32" width="240" height="12" class="box"/>
  <text x="22" y="28" class="small">←</text>
  <text x="125" y="28" text-anchor="middle" class="roll-name">New Roll</text>

  <line x1="10" y1="44" x2="250" y2="44" class="divider"/>

  <text x="20" y="58" class="section-head">film stock</text>
  <rect x="20" y="62" width="210" height="26" rx="4" class="box"/>
  <text x="125" y="79" text-anchor="middle" class="value-sm">HP5 Plus 400  ›</text>

  <text x="20" y="102" class="label">frame count</text>
  <rect x="20" y="106" width="70" height="22" rx="4" class="box"/>
  <text x="55" y="121" text-anchor="middle" class="meta">36</text>
  <text x="96" y="121" class="meta-muted">+ 2 extra = 38 slots</text>

  <text x="20" y="142" class="label">push / pull</text>
  <rect x="20" y="146" width="24" height="22" rx="4" class="btn"/>
  <text x="32" y="161" text-anchor="middle" class="arrow">−</text>
  <rect x="48" y="146" width="56" height="22" rx="4" class="box"/>
  <text x="76" y="161" text-anchor="middle" class="value-sm">box</text>
  <rect x="108" y="146" width="24" height="22" rx="4" class="btn"/>
  <text x="120" y="161" text-anchor="middle" class="arrow">+</text>
  <text x="140" y="157" class="iso-label">ISO 400</text>
  <text x="140" y="167" class="iso-label">box speed</text>

  <text x="20" y="186" class="label">film expiry date</text>
  <rect x="20" y="190" width="130" height="22" rx="4" class="box"/>
  <text x="85" y="205" text-anchor="middle" class="meta-muted">optional  ›</text>

  <line x1="10" y1="222" x2="250" y2="222" class="divider-section"/>

  <text x="20" y="236" class="section-head">kit  —  optional</text>
  <rect x="20" y="240" width="210" height="26" rx="4" class="btn-kit"/>
  <text x="125" y="257" text-anchor="middle" class="meta">load from kit — pre-fills gear below  ›</text>

  <line x1="10" y1="276" x2="250" y2="276" class="divider-section"/>

  <text x="20" y="290" class="section-head">camera body</text>
  <rect x="20" y="294" width="210" height="26" rx="4" class="box"/>
  <text x="125" y="311" text-anchor="middle" class="value-sm">Canon AE-1  ›</text>

  <line x1="10" y1="330" x2="250" y2="330" class="divider-section"/>

  <text x="20" y="344" class="section-head">lenses</text>
  <text x="230" y="344" text-anchor="end" class="meta-muted">Canon FD</text>
  <rect x="20" y="348" width="210" height="22" rx="4" class="box"/>
  <text x="125" y="363" text-anchor="middle" class="meta">FD 50mm f/1.4  (primary)  ›</text>
  <rect x="20" y="374" width="210" height="22" rx="4" class="btn"/>
  <text x="125" y="389" text-anchor="middle" class="meta-muted">+ add another lens</text>

  <line x1="10" y1="406" x2="250" y2="406" class="divider-section"/>

  <text x="20" y="420" class="section-head">filters</text>
  <rect x="20" y="424" width="36" height="18" rx="9" class="chip-on"/>
  <text x="38" y="437" text-anchor="middle" class="chip-text-on">YK2</text>
  <rect x="60" y="424" width="28" height="18" rx="9" class="chip-on"/>
  <text x="74" y="437" text-anchor="middle" class="chip-text-on">UV</text>
  <rect x="92" y="424" width="34" height="18" rx="9" class="chip-off"/>
  <text x="109" y="437" text-anchor="middle" class="chip-text-off">ND8</text>
  <rect x="130" y="424" width="18" height="18" rx="9" class="btn"/>
  <text x="139" y="437" text-anchor="middle" class="chip-text-on">+</text>

  <line x1="10" y1="454" x2="250" y2="454" class="divider-section"/>

  <text x="20" y="468" class="section-head">details</text>

  <text x="20" y="484" class="label">GPS capture</text>
  <rect x="180" y="476" width="50" height="18" rx="9" class="toggle-off"/>
  <text x="205" y="489" text-anchor="middle" class="meta-muted">off</text>

  <text x="20" y="510" class="label">roll name</text>
  <rect x="20" y="514" width="210" height="22" rx="4" class="input"/>
  <text x="125" y="529" text-anchor="middle" class="meta">HP5 Plus — 2026-03-18</text>

  <line x1="10" y1="546" x2="250" y2="546" class="divider"/>

  <text x="20" y="560" class="annotation">custom ISO override — collapsed by default</text>
  <text x="20" y="572" class="custom">set custom ISO instead of push/pull</text>

  <line x1="10" y1="584" x2="250" y2="584" class="divider"/>

  <rect x="20" y="594" width="100" height="34" rx="6" class="btn"/>
  <text x="70" y="616" text-anchor="middle" class="btn-label-secondary">create roll</text>

  <rect x="130" y="594" width="100" height="34" rx="6" class="btn-primary"/>
  <text x="180" y="609" text-anchor="middle" class="btn-label">create</text>
  <text x="180" y="621" text-anchor="middle" class="btn-label">+ load</text>

  <text x="258" y="400" class="annotation">scroll</text>
  <line x1="254" y1="44" x2="254" y2="584" style="stroke:#ddd;stroke-width:0.5;stroke-dasharray:2,2;"/>
</svg>

