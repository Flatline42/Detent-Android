<svg viewBox="0 0 300 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .label { font-family: sans-serif; font-size: 9px; fill: #888; }
      .value-lg { font-family: sans-serif; font-size: 19px; font-weight: 500; fill: #111; }
      .peek-1 { font-family: sans-serif; font-size: 10px; fill: #888; }
      .peek-2 { font-family: sans-serif; font-size: 9px; fill: #bbb; }
      .dot { font-family: sans-serif; font-size: 13px; font-weight: 500; fill: #bbb; }
      .dot-adj { font-family: sans-serif; font-size: 13px; font-weight: 500; fill: #888; }
      .pipe { font-family: sans-serif; font-size: 10px; fill: #bbb; }
      .pipe-adj { font-family: sans-serif; font-size: 10px; fill: #888; }
      .small { font-family: sans-serif; font-size: 10px; fill: #888; }
      .small-muted { font-family: sans-serif; font-size: 9px; fill: #aaa; }
      .btn-label { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #111; }
      .screen-title { font-family: sans-serif; font-size: 11px; font-weight: 500; fill: #111; }
      .annotation { font-family: monospace; font-size: 8px; fill: #bbb; }
      .outer { fill: #f5f5f5; stroke: #bbb; stroke-width: 1; }
      .box { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .wheel { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
      .selected-bg { fill: #fff3cc; stroke: none; }
      .logbtn { fill: #fff; stroke: #bbb; stroke-width: 1; }
      .divider { stroke: #e0e0e0; stroke-width: 0.5; }

      /* Color spec annotations */
      .spec-selected { font-family: monospace; font-size: 7px; fill: #FFBF00; }
      .spec-adj { font-family: monospace; font-size: 7px; fill: #A28089; }
      .spec-far { font-family: monospace; font-size: 7px; fill: #bbb; }
    </style>
  </defs>

  <!-- Widget shell -->
  <rect x="10" y="10" width="260" height="310" rx="14" class="outer"/>

  <!-- Header -->
  <rect x="10" y="10" width="260" height="52" rx="14" class="box"/>
  <rect x="10" y="48" width="260" height="14" class="box"/>
  <text x="24" y="28" class="small">HP5 Plus — Canon AE-1</text>
  <text x="258" y="28" text-anchor="end" class="small">●● filters</text>
  <text x="24" y="42" class="small-muted">Frame 14 / 38</text>
  <text x="258" y="42" text-anchor="end" class="small-muted">-1.0 EV</text>
  <line x1="10" y1="62" x2="270" y2="62" class="divider"/>

  <!-- Aperture label -->
  <text x="140" y="78" text-anchor="middle" class="label">aperture</text>

  <!-- Aperture wheel -->
  <rect x="24" y="84" width="222" height="50" rx="8" class="wheel"/>
  <!-- selected highlight -->
  <rect x="122" y="86" width="36" height="46" rx="6" class="selected-bg"/>
  <!-- far left peek -->
  <text x="44" y="113" text-anchor="middle" class="peek-2">4</text>
  <!-- dot far -->
  <text x="64" y="113" text-anchor="middle" class="dot">·</text>
  <!-- adj left -->
  <text x="86" y="113" text-anchor="middle" class="peek-1">4.8</text>
  <!-- dot adj -->
  <text x="108" y="113" text-anchor="middle" class="dot-adj">·</text>
  <!-- SELECTED — Golden Hour Amber #FFBF00 -->
  <text x="140" y="115" text-anchor="middle" class="value-lg" style="fill:#FFBF00">5.6</text>
  <!-- dot adj -->
  <text x="172" y="113" text-anchor="middle" class="dot-adj">·</text>
  <!-- adj right -->
  <text x="194" y="113" text-anchor="middle" class="peek-1">6.7</text>
  <!-- dot far -->
  <text x="216" y="113" text-anchor="middle" class="dot">·</text>
  <!-- far right peek -->
  <text x="236" y="113" text-anchor="middle" class="peek-2">8</text>

  <!-- Shutter label -->
  <text x="140" y="150" text-anchor="middle" class="label">shutter speed</text>

  <!-- Shutter wheel -->
  <rect x="24" y="156" width="222" height="50" rx="8" class="wheel"/>
  <!-- selected highlight -->
  <rect x="122" y="158" width="36" height="46" rx="6" class="selected-bg"/>
  <!-- far left -->
  <text x="44" y="185" text-anchor="middle" class="peek-2">30</text>
  <text x="66" y="185" text-anchor="middle" class="pipe">|</text>
  <!-- adj left -->
  <text x="88" y="185" text-anchor="middle" class="peek-1">60</text>
  <text x="110" y="185" text-anchor="middle" class="pipe-adj">|</text>
  <!-- SELECTED — Golden Hour Amber #FFBF00 -->
  <text x="140" y="187" text-anchor="middle" class="value-lg" style="fill:#FFBF00">125</text>
  <text x="170" y="185" text-anchor="middle" class="pipe-adj">|</text>
  <!-- adj right -->
  <text x="192" y="185" text-anchor="middle" class="peek-1">250</text>
  <text x="214" y="185" text-anchor="middle" class="pipe">|</text>
  <!-- far right -->
  <text x="236" y="185" text-anchor="middle" class="peek-2">500</text>

  <line x1="10" y1="216" x2="270" y2="216" class="divider"/>

  <!-- Log frame button — half height -->
  <rect x="24" y="226" width="222" height="74" rx="10" class="logbtn"/>
  <text x="135" y="268" text-anchor="middle" class="btn-label">log frame</text>

  <!-- Color spec annotations -->
  <text x="10" y="320" class="spec-selected">selected: #FFBF00 (Amber) — Golden Hour / #FFD700 (Safety Gold) — Alpine</text>
  <text x="10" y="330" class="spec-adj">adjacent ±1: #A28089 (Dusty Mauve) — Golden Hour / #D1D1D1 (Light Gray) — Alpine</text>
  <text x="10" y="340" class="spec-far">far peek ±2 + dots/pipes: #A28089 @ ~50% opacity / #D1D1D1 @ ~50% opacity</text>
</svg>
